name: GitHub → Feishu Commit Notify

on:
  push:
    branches:
      - main

jobs:
  notify-feishu:
    runs-on: ubuntu-latest
    steps:
      - name: Send commit info to Feishu
        env:
          FEISHU_WEBHOOK: https://open.feishu.cn/open-apis/bot/v2/hook/498e0e3e-e39d-4c34-9a72-10d85deebe3d
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BEFORE: ${{ github.event.before }}
        run: |
          REPO="${GITHUB_REPOSITORY}"
          BRANCH="${GITHUB_REF_NAME}"
          PUSHER="${GITHUB_ACTOR}"

          # 获取最新 commit（最多5条）
          COMMITS=$(git log -5 --pretty=format:'- [%h](https://github.com/'"$REPO"'/commit/%H) %s by %an' $GITHUB_BEFORE..$GITHUB_SHA)

          if [ -z "$COMMITS" ]; then
            echo "No new commits."
            exit 0
          fi

          # 构造 JSON（单行拼接，避免 EOF 解析问题）
          PAYLOAD="{\"msg_type\":\"interactive\",\"card\":{\"header\":{\"title\":{\"tag\":\"plain_text\",\"content\":\"📌 GitHub Push 通知\"}},\"elements\":[{\"tag\":\"div\",\"text\":{\"tag\":\"lark_md\",\"content\":\"**Repository**: $REPO\\n**Branch**: $BRANCH\\n**Pusher**: $PUSHER\\n\\n**Commits:**\\n$COMMITS\"}}]}}"

          curl -s -X POST $FEISHU_WEBHOOK \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
